# Configure AWS: add **AWS_DEPLOY_ROLE_ARN** as a repository *Variable* (Settings → Secrets and
# variables → Actions → Variables) **or** *Secret* with the IAM role ARN from unicare_zone
# `infra/github-actions` output `github_actions_ecr_role_arn`.
#
# The trust policy allows `repo:<github_org>/<github_repo>:*` — must match this repo (e.g. alonzojoe/chat-api).

name: Test and push to ECR

on:
  push:
    branches: [main]
  workflow_dispatch:

# Required for OIDC (GitHub → AWS). Without `id-token: write`, credential loading fails.
permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: il-central-1
  ECR_REPOSITORY: unicare/chat-api
  # Third-party actions (e.g. aws-actions/*) until they ship Node 24 builds; see:
  # https://github.blog/changelog/2025-09-19-deprecation-of-node-20-on-github-actions-runners/
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: npm

      - run: npm ci

      - run: npm test

  build-and-push:
    needs: test
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Resolve deploy role ARN
        id: role
        env:
          FROM_VAR: ${{ vars.AWS_DEPLOY_ROLE_ARN }}
          FROM_SECRET: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
        run: |
          ARN="${FROM_VAR:-$FROM_SECRET}"
          if [ -z "$ARN" ]; then
            echo "::error::Set repository Variable or Secret AWS_DEPLOY_ROLE_ARN to the IAM role ARN (Terraform output github_actions_ecr_role_arn). See workflow header comment."
            exit 1
          fi
          echo "arn=$ARN" >> "$GITHUB_OUTPUT"

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ steps.role.outputs.arn }}
          aws-region: ${{ env.AWS_REGION }}
          audience: sts.amazonaws.com

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build, tag, and push image
        env:
          REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker build -t "$ECR_REPOSITORY:$IMAGE_TAG" -t "$ECR_REPOSITORY:latest" .
          docker tag "$ECR_REPOSITORY:$IMAGE_TAG" "$REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG"
          docker tag "$ECR_REPOSITORY:latest" "$REGISTRY/$ECR_REPOSITORY:latest"
          docker push "$REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG"
          docker push "$REGISTRY/$ECR_REPOSITORY:latest"
